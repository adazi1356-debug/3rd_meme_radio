<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3rd Meme Radio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="topbar" class="topbar hidden"></div>

  <div id="app" class="hidden">
    <div class="panel">
      <div class="header">
        <div>
          <div class="kicker">3RD MEME RADIO</div>
          <div class="title-row">
            <h1>ミーム設定</h1>
            <div class="title-mascot-wrap" aria-hidden="true">
              <img id="titleMascot" class="title-mascot" src="assets/meme.png" alt="meme mascot">
            </div>
          </div>
          <p>MP3 / 死亡音 / お気に入り / 音の広さ / 音量 / 管理者削除を設定できます。</p>
        </div>
        <div class="header-right">
          <div id="versionBadge" class="version-badge">v1.2.4</div>
          <button id="closeBtn" class="icon-btn" title="閉じる">×</button>
        </div>
      </div>
      <div id="viewRoot"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
